# ================================================================
# security-scan-reusable.yml — Reusable Shift-Left Security Pipeline
#
# A reusable workflow that any Python project can call to get
# full shift-left security scanning without any tool configuration.
#
# Runs: Gitleaks (secrets) + tfsec (IaC) → Semgrep (SAST) → Trivy (SCA)
# Generates a generic security findings dashboard on GitHub Pages.
#
# Usage in any repo:
#   jobs:
#     security:
#       uses: ananthu3212/shift-left-security-thesis/.github/workflows/security-scan-reusable.yml@main
#       with:
#         docker-image-name: my-app
#         semgrep-config: p/python
#         trivy-severity: HIGH,CRITICAL
#         fail-on-findings: true
#         enable-flask-rules: false
#
# Thesis: Shift-Left Security in CI/CD Pipelines
# Author: Ananthu Chandra Babu
# University: Westfälische Hochschule Gelsenkirchen, 2026
# ================================================================

name: Shift-Left Security Scan (Reusable)

on:
  workflow_call:
    inputs:
      docker-image-name:
        description: 'Name for the Docker image to build and scan'
        required: true
        type: string
      semgrep-config:
        description: 'Semgrep ruleset (e.g. p/python, p/javascript)'
        required: false
        type: string
        default: 'p/python'
      custom-rules-path:
        description: 'Path to custom Semgrep rules directory in the calling repo (optional)'
        required: false
        type: string
        default: ''
      enable-flask-rules:
        description: 'Download and apply Flask-specific custom Semgrep rules from the thesis repository. Enable for Flask projects only — may produce false positives on non-Flask codebases.'
        required: false
        type: boolean
        default: false
      trivy-severity:
        description: 'CVE severity threshold (e.g. HIGH,CRITICAL)'
        required: false
        type: string
        default: 'HIGH,CRITICAL'
      fail-on-findings:
        description: 'Block pipeline if findings are detected'
        required: false
        type: boolean
        default: true

permissions:
  security-events: write
  contents: read
  pages: write
  id-token: write

jobs:
  # ================================================================
  # JOB 1 — Secret Scanning
  # ================================================================
  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        # Pinned to v8.18.4 — version used during thesis evaluation
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz
          ./gitleaks detect --source . -v --report-format json --report-path gitleaks-report.json
          exit_code=$?

          echo "## 🔑 Secret Scanning (Gitleaks)" >> $GITHUB_STEP_SUMMARY
          if [ $exit_code -eq 0 ]; then
            echo "✅ No secrets detected" >> $GITHUB_STEP_SUMMARY
          else
            COUNT=$(python3 -c "import json; data=json.load(open('gitleaks-report.json')); print(len(data))" 2>/dev/null || echo "1+")
            echo "❌ **$COUNT secret(s) detected**" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ inputs.fail-on-findings }}" = "true" ]; then
            exit $exit_code
          fi

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  # ================================================================
  # JOB 2 — IaC Security Scan
  # ================================================================
  iac-scanning:
    name: IaC Security Scan (tfsec)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec on Terraform infrastructure
        # Pinned to v1.28.11 — version used during thesis evaluation
        # Runs with --soft-fail so IaC findings do not block the pipeline
        # independently — blocking is controlled by fail-on-findings input
        run: |
          curl -sSfL https://github.com/aquasecurity/tfsec/releases/download/v1.28.11/tfsec-linux-amd64 -o tfsec
          chmod +x tfsec

          if [ -d "terraform" ]; then
            ./tfsec terraform/ --format json --out tfsec-report.json --soft-fail || true
          else
            echo '{"results":[]}' > tfsec-report.json
            echo "No terraform/ directory found — IaC scan skipped." >> $GITHUB_STEP_SUMMARY
          fi

          echo "## 🏗️ IaC Security Scan (tfsec)" >> $GITHUB_STEP_SUMMARY

          if [ -s tfsec-report.json ]; then
            CRITICAL=$(python3 -c "
          import json
          data = json.load(open('tfsec-report.json'))
          results = data.get('results') or []
          print(sum(1 for r in results if r.get('severity') == 'CRITICAL'))" 2>/dev/null || echo "0")

            HIGH=$(python3 -c "
          import json
          data = json.load(open('tfsec-report.json'))
          results = data.get('results') or []
          print(sum(1 for r in results if r.get('severity') == 'HIGH'))" 2>/dev/null || echo "0")

            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| 🔴 CRITICAL | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
            echo "| 🟠 HIGH     | $HIGH |" >> $GITHUB_STEP_SUMMARY

            TOTAL=$((CRITICAL + HIGH))
            if [ $TOTAL -gt 0 ]; then
              echo "❌ **$TOTAL CRITICAL/HIGH IaC finding(s) detected**" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ No CRITICAL/HIGH IaC misconfigurations detected" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Upload tfsec report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfsec-report
          path: tfsec-report.json

  # ================================================================
  # JOB 3 — SAST
  # ================================================================
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: [secret-scanning, iac-scanning]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Flask-specific custom rules from thesis repository
        # Only runs when enable-flask-rules is true.
        # Downloads 7 custom Semgrep rules targeting Flask vulnerability patterns:
        # insecure deserialization, path traversal, open redirect, sensitive data
        # exposure, CORS wildcard, CSP unsafe-inline, and debug mode.
        # These rules are specific to Flask — do not enable for non-Flask projects.
        if: inputs.enable-flask-rules
        run: |
          mkdir -p thesis-custom-rules
          BASE_URL="https://raw.githubusercontent.com/ananthu3212/shift-left-security-thesis/main/rules"
          for rule in deserialization path-traversal open-redirect \
                      sensitive-data-exposure cors-wildcard \
                      csp-unsafe-inline flask-debug-mode; do
            curl -sSfL "${BASE_URL}/${rule}.yaml" \
              -o "thesis-custom-rules/${rule}.yaml"
          done
          echo "## ⚡ Flask Custom Rules" >> $GITHUB_STEP_SUMMARY
          echo "✅ Downloaded 7 Flask-specific custom Semgrep rules from thesis repository" >> $GITHUB_STEP_SUMMARY

      - name: Build Semgrep config string
        id: semgrep-config
        run: |
          CONFIG="--config=${{ inputs.semgrep-config }}"
          if [ -n "${{ inputs.custom-rules-path }}" ] && \
             [ -d "${{ inputs.custom-rules-path }}" ]; then
            CONFIG="$CONFIG --config=${{ inputs.custom-rules-path }}"
          fi
          if [ -d "thesis-custom-rules" ]; then
            CONFIG="$CONFIG --config=thesis-custom-rules"
          fi
          echo "config=$CONFIG" >> $GITHUB_OUTPUT

      - name: Run Semgrep
        # Pinned to v1.162.0 — version used during thesis evaluation
        run: |
          pip install semgrep==1.162.0

          semgrep ${{ steps.semgrep-config.outputs.config }} --sarif -o semgrep.sarif . || true

          set +e
          semgrep ${{ steps.semgrep-config.outputs.config }} --json -o semgrep-report.json --error .
          SEMGREP_EXIT=$?
          set -e

          echo "## 🔍 SAST (Semgrep)" >> $GITHUB_STEP_SUMMARY
          echo "Config: ${{ steps.semgrep-config.outputs.config }}" >> $GITHUB_STEP_SUMMARY

          FINDINGS=$(python3 -c "
          import json
          data=json.load(open('semgrep-report.json'))
          print(len(data.get('results', [])))" 2>/dev/null || echo "unknown")

          if [ $SEMGREP_EXIT -eq 0 ]; then
            echo "✅ No findings detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **$FINDINGS finding(s) detected**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Rule | File | Line |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          data = json.load(open('semgrep-report.json'))
          for r in data.get('results', []):
              rule = r['check_id'].split('.')[-1]
              path = r['path']
              line = r['start']['line']
              print(f'| {rule} | \`{path}\` | {line} |')
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          fi

          if [ "${{ inputs.fail-on-findings }}" = "true" ]; then
            exit $SEMGREP_EXIT
          fi

      - name: Upload Semgrep SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: |
            semgrep-report.json
            semgrep.sarif

  # ================================================================
  # JOB 4 — SCA + Image Scan
  # ================================================================
  sca-and-image:
    name: SCA + Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: sast
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ inputs.docker-image-name }}:scan .

      - name: Run Trivy filesystem scan — JSON
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-fs-report.json
          severity: ${{ inputs.trivy-severity }}
          exit-code: 0

      - name: Run Trivy filesystem scan — SARIF
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: ${{ inputs.trivy-severity }}
          exit-code: 0

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy

      - name: Write Trivy summary and check findings
        if: always()
        run: |
          echo "## 📦 SCA + Image Scan (Trivy)" >> $GITHUB_STEP_SUMMARY
          echo "Severity threshold: ${{ inputs.trivy-severity }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          CRITICAL=$(python3 -c "
          import json
          data = json.load(open('trivy-fs-report.json'))
          vulns = [v for r in data.get('Results', [])
                   for v in (r.get('Vulnerabilities') or [])
                   if v.get('Severity') == 'CRITICAL']
          print(len(vulns))" 2>/dev/null || echo "0")

          HIGH=$(python3 -c "
          import json
          data = json.load(open('trivy-fs-report.json'))
          vulns = [v for r in data.get('Results', [])
                   for v in (r.get('Vulnerabilities') or [])
                   if v.get('Severity') == 'HIGH']
          print(len(vulns))" 2>/dev/null || echo "0")

          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 CRITICAL | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 HIGH     | $HIGH |" >> $GITHUB_STEP_SUMMARY

          TOTAL=$((CRITICAL + HIGH))
          if [ $TOTAL -gt 0 ]; then
            echo "❌ **$TOTAL finding(s) detected**" >> $GITHUB_STEP_SUMMARY
            if [ "${{ inputs.fail-on-findings }}" = "true" ]; then
              echo "Pipeline blocked." >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ Running in audit-only mode — pipeline not blocked." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "✅ No findings at ${{ inputs.trivy-severity }} threshold" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ inputs.fail-on-findings }}" = "true" ] && [ $TOTAL -gt 0 ]; then
            exit 1
          fi

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-fs-report.json
            trivy-fs.sarif

  # ================================================================
  # JOB 5 — Generate Security Dashboard
  # ================================================================
  generate-dashboard:
    name: Generate Security Dashboard
    runs-on: ubuntu-latest
    needs: [secret-scanning, iac-scanning, sast, sca-and-image]
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all scan reports
        uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Download generic dashboard generator from thesis repo
        run: |
          curl -sSfL \
            https://raw.githubusercontent.com/ananthu3212/shift-left-security-thesis/main/scripts/generate_generic_report.py \
            -o generate_generic_report.py

      - name: Generate security dashboard
        run: python3 generate_generic_report.py

      - name: Upload dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generic-security-dashboard
          path: generic-dashboard/index.html

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: generic-dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Write dashboard summary
        if: always()
        run: |
          PAGES_URL="${{ steps.deployment.outputs.page_url }}"
          if [ -z "$PAGES_URL" ]; then
            PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          fi
          echo "## 🌐 Security Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Security findings dashboard published at:" >> $GITHUB_STEP_SUMMARY
          echo "**$PAGES_URL**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Also available as artifact: \`generic-security-dashboard\`" >> $GITHUB_STEP_SUMMARY