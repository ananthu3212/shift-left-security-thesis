# ================================================================
# security-scan-reusable.yml — Reusable Shift-Left Security Pipeline
#
# Runs: Gitleaks (secrets) + tfsec (IaC) → Semgrep (SAST) → Trivy (SCA)
#       → OWASP ZAP (DAST, optional) → Dashboard
#
# Thesis artefact 4 of 4.
# Callable from any Python repository via workflow_call.
# Validated on 10 independent Python repositories (portability test).
#
# Thesis: Shift-Left Security in CI/CD Pipelines
# Author: Ananthu Chandra Babu
# University: Westfälische Hochschule Gelsenkirchen, 2026
# ================================================================

name: Shift-Left Security Scan (Reusable)

on:
  workflow_call:
    inputs:
      docker-image-name:
        description: 'Name for the Docker image to build and scan'
        required: true
        type: string
      semgrep-config:
        description: 'Semgrep ruleset (e.g. p/python, p/javascript)'
        required: false
        type: string
        default: 'p/python'
      custom-rules-path:
        description: 'Path to custom Semgrep rules directory in the calling repo (optional)'
        required: false
        type: string
        default: ''
      enable-flask-rules:
        description: 'Download and apply Flask-specific custom Semgrep rules from the thesis repository.'
        required: false
        type: boolean
        default: false
      trivy-severity:
        description: 'CVE severity threshold (e.g. HIGH,CRITICAL)'
        required: false
        type: string
        default: 'HIGH,CRITICAL'
      fail-on-findings:
        description: 'Block pipeline if findings are detected'
        required: false
        type: boolean
        default: true
      enable-dast:
        description: 'Run OWASP ZAP DAST baseline scan against the running application.'
        required: false
        type: boolean
        default: false
      app-start-command:
        description: 'Command to start the application for DAST scanning (e.g. python app.py).'
        required: false
        type: string
        default: 'python app.py'
      app-port:
        description: 'Port the application listens on for DAST scanning.'
        required: false
        type: string
        default: '5000'

permissions:
  security-events: write
  contents: read
  pages: write
  id-token: write

jobs:

  # ================================================================
  # JOB 1 — Secret Scanning (Gitleaks)
  # ================================================================
  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        # Pinned to v8.18.4 — version used during thesis evaluation.
        # Downloads custom Gitleaks config from thesis repo which adds
        # Flask application-level secret detection on top of default rules.
        # Falls back to default rules if download fails.
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz

          curl -sSfL \
            https://raw.githubusercontent.com/ananthu3212/shift-left-security-thesis/main/.gitleaks.toml \
            -o .gitleaks-thesis.toml 2>/dev/null || true

          CONFIG_FLAG=""
          if [ -f .gitleaks-thesis.toml ]; then
            CONFIG_FLAG="--config .gitleaks-thesis.toml"
            echo "✅ Custom Gitleaks config loaded from thesis repo" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Custom config unavailable — using default Gitleaks rules" >> $GITHUB_STEP_SUMMARY
          fi

          set +e
          ./gitleaks detect --source . -v $CONFIG_FLAG \
            --report-format json --report-path gitleaks-report.json
          exit_code=$?
          set -e

          echo "## 🔑 Secret Scanning (Gitleaks)" >> $GITHUB_STEP_SUMMARY
          if [ $exit_code -eq 0 ]; then
            echo "✅ No secrets detected" >> $GITHUB_STEP_SUMMARY
          else
            COUNT=$(python3 -c "
          import json
          data = json.load(open('gitleaks-report.json'))
          print(len(data))" 2>/dev/null || echo "1+")
            echo "❌ **$COUNT secret(s) detected**" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ inputs.fail-on-findings }}" = "true" ]; then
            exit $exit_code
          fi

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  # ================================================================
  # JOB 2 — IaC Security Scan (tfsec)
  # ================================================================
  iac-scanning:
    name: IaC Security Scan (tfsec)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec on Terraform infrastructure
        # Pinned to v1.28.11 — version used during thesis evaluation.
        # Skips gracefully if no terraform/ directory exists in caller repo.
        run: |
          curl -sSfL \
            https://github.com/aquasecurity/tfsec/releases/download/v1.28.11/tfsec-linux-amd64 \
            -o tfsec
          chmod +x tfsec

          if [ -d "terraform" ]; then
            ./tfsec terraform/ --format json --out tfsec-report.json --soft-fail || true
          else
            echo '{"results":[]}' > tfsec-report.json
            echo "No terraform/ directory found — IaC scan skipped." >> $GITHUB_STEP_SUMMARY
          fi

          echo "## 🏗️ IaC Security Scan (tfsec)" >> $GITHUB_STEP_SUMMARY

          CRITICAL=$(python3 -c "
          import json
          data = json.load(open('tfsec-report.json'))
          results = data.get('results') or []
          print(sum(1 for r in results if r.get('severity') == 'CRITICAL'))" \
          2>/dev/null || echo "0")

          HIGH=$(python3 -c "
          import json
          data = json.load(open('tfsec-report.json'))
          results = data.get('results') or []
          print(sum(1 for r in results if r.get('severity') == 'HIGH'))" \
          2>/dev/null || echo "0")

          MEDIUM=$(python3 -c "
          import json
          data = json.load(open('tfsec-report.json'))
          results = data.get('results') or []
          print(sum(1 for r in results if r.get('severity') == 'MEDIUM'))" \
          2>/dev/null || echo "0")

          LOW=$(python3 -c "
          import json
          data = json.load(open('tfsec-report.json'))
          results = data.get('results') or []
          print(sum(1 for r in results if r.get('severity') == 'LOW'))" \
          2>/dev/null || echo "0")

          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 CRITICAL | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 HIGH     | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 MEDIUM   | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔵 LOW      | $LOW |" >> $GITHUB_STEP_SUMMARY

          TOTAL=$((CRITICAL + HIGH))
          if [ $TOTAL -gt 0 ]; then
            echo "❌ **$TOTAL CRITICAL/HIGH IaC finding(s) detected**" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No CRITICAL/HIGH IaC misconfigurations detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload tfsec report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfsec-report
          path: tfsec-report.json

  # ================================================================
  # JOB 3 — SAST (Semgrep)
  # Runs after both Stage 1 jobs complete.
  # ================================================================
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: [ secret-scanning, iac-scanning ]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Flask-specific custom rules from thesis repository
        # Only runs when enable-flask-rules is true.
        # Downloads 9 custom Semgrep rules targeting Flask vulnerability patterns.
        # 7 of these rules fire on flask-webgoat (V04-V10 in the ground truth).
        # 2 additional rules (ssti-fstring, jwt-insecure-decode) target patterns
        # not present in flask-webgoat but valid for other Flask applications.
        if: inputs.enable-flask-rules
        run: |
          mkdir -p thesis-custom-rules
          BASE_URL="https://raw.githubusercontent.com/ananthu3212/shift-left-security-thesis/main/rules"
          for rule in deserialization path-traversal open-redirect \
                      sensitive-data-exposure cors-wildcard \
                      csp-unsafe-inline flask-debug-mode \
                      ssti-fstring jwt-insecure-decode; do
            curl -sSfL "${BASE_URL}/${rule}.yaml" \
              -o "thesis-custom-rules/${rule}.yaml"
          done
          echo "## ⚡ Flask Custom Rules" >> $GITHUB_STEP_SUMMARY
          echo "✅ Downloaded 9 Flask-specific custom Semgrep rules from thesis repository" \
            >> $GITHUB_STEP_SUMMARY

      - name: Build Semgrep config string
        id: semgrep-config
        run: |
          CONFIG="--config=${{ inputs.semgrep-config }}"

          if [ -n "${{ inputs.custom-rules-path }}" ] && \
             [ -d "${{ inputs.custom-rules-path }}" ]; then
            CONFIG="$CONFIG --config=${{ inputs.custom-rules-path }}"
          fi

          if [ -d "thesis-custom-rules" ]; then
            CONFIG="$CONFIG --config=thesis-custom-rules"
          fi

          echo "config=$CONFIG" >> $GITHUB_OUTPUT

      - name: Run Semgrep
        # Pinned to v1.162.0 — version used during thesis evaluation.
        run: |
          pip install semgrep==1.162.0

          semgrep ${{ steps.semgrep-config.outputs.config }} \
            --sarif -o semgrep.sarif . || true

          set +e
          semgrep ${{ steps.semgrep-config.outputs.config }} \
            --json -o semgrep-report.json --error .
          SEMGREP_EXIT=$?
          set -e

          echo "## 🔍 SAST (Semgrep)" >> $GITHUB_STEP_SUMMARY
          echo "Config: ${{ steps.semgrep-config.outputs.config }}" >> $GITHUB_STEP_SUMMARY

          FINDINGS=$(python3 -c "
          import json
          data = json.load(open('semgrep-report.json'))
          print(len(data.get('results', [])))" 2>/dev/null || echo "unknown")

          if [ $SEMGREP_EXIT -eq 0 ]; then
            echo "✅ No findings detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **$FINDINGS finding(s) detected**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Rule | File | Line |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          data = json.load(open('semgrep-report.json'))
          for r in data.get('results', []):
              rule = r['check_id'].split('.')[-1]
              path = r['path']
              line = r['start']['line']
              print(f'| {rule} | \`{path}\` | {line} |')
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          fi

          if [ "${{ inputs.fail-on-findings }}" = "true" ]; then
            exit $SEMGREP_EXIT
          fi

      - name: Upload Semgrep SARIF to GitHub Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: |
            semgrep-report.json
            semgrep.sarif

  # ================================================================
  # JOB 4 — SCA + Image Scan (Trivy)
  # Runs after Semgrep completes.
  #
  # ARCHITECTURAL DECISION — FS scan runs BEFORE Docker build:
  # Trivy FS scan reads requirements.txt directly from the repository.
  # It does not need a Docker image. Placing the FS scan first
  # guarantees CVE detection succeeds regardless of whether the
  # Docker build completes. This is the correct fix — not
  # continue-on-error. Docker build and image scan run afterwards
  # as additional analysis. If the Docker build fails (e.g. EOL base
  # image, missing system dependencies), FS scan results are already
  # captured and the job does not fail silently.
  # ================================================================
  sca-and-image:
    name: SCA + Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: sast
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 1: Filesystem scan — NO Docker dependency ────────────
      - name: Run Trivy filesystem scan — JSON
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-fs-report.json
          severity: ${{ inputs.trivy-severity }}
          exit-code: 0

      - name: Run Trivy filesystem scan — SARIF
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: ${{ inputs.trivy-severity }}
          exit-code: 0

      - name: Upload Trivy FS SARIF to GitHub Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      # ── Step 2: SBOM — NO Docker dependency ──────────────────────
      - name: Generate CycloneDX SBOM
        # CycloneDX format chosen for broad tooling support
        # and OWASP standardisation.
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.cdx.json
          exit-code: 0

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json

      # ── Step 3: Report FS findings ────────────────────────────────
      - name: Write Trivy FS summary and check findings
        if: always()
        run: |
          echo "## 📦 SCA + Image Scan (Trivy)" >> $GITHUB_STEP_SUMMARY
          echo "Severity threshold: ${{ inputs.trivy-severity }}" >> $GITHUB_STEP_SUMMARY

          CRITICAL=$(python3 -c "
          import json
          data = json.load(open('trivy-fs-report.json'))
          vulns = [v for r in data.get('Results', [])
                   for v in (r.get('Vulnerabilities') or [])
                   if v.get('Severity') == 'CRITICAL']
          print(len(vulns))" 2>/dev/null || echo "0")

          HIGH=$(python3 -c "
          import json
          data = json.load(open('trivy-fs-report.json'))
          vulns = [v for r in data.get('Results', [])
                   for v in (r.get('Vulnerabilities') or [])
                   if v.get('Severity') == 'HIGH']
          print(len(vulns))" 2>/dev/null || echo "0")

          echo "### Filesystem Scan (Dependencies)" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 CRITICAL | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 HIGH     | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 **SBOM generated:** CycloneDX format — artifact \`sbom-cyclonedx\`" \
            >> $GITHUB_STEP_SUMMARY

          TOTAL=$((CRITICAL + HIGH))
          if [ $TOTAL -gt 0 ]; then
            echo "❌ **$TOTAL finding(s) detected**" >> $GITHUB_STEP_SUMMARY
            if [ "${{ inputs.fail-on-findings }}" != "true" ]; then
              echo "⚠️ Audit-only mode — pipeline not blocked." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "✅ No findings at ${{ inputs.trivy-severity }} threshold" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ inputs.fail-on-findings }}" = "true" ] && [ $TOTAL -gt 0 ]; then
            exit 1
          fi

      # ── Step 4: Docker build — AFTER FS scan ─────────────────────
      - name: Build Docker image
        run: docker build -t ${{ inputs.docker-image-name }}:scan .

      # ── Step 5: Image scan — AFTER Docker build ───────────────────
      - name: Run Trivy image scan — JSON
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.docker-image-name }}:scan
          format: json
          output: trivy-image-report.json
          severity: ${{ inputs.trivy-severity }}
          exit-code: 0

      - name: Run Trivy image scan — SARIF
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.docker-image-name }}:scan
          format: sarif
          output: trivy-image.sarif
          severity: ${{ inputs.trivy-severity }}
          exit-code: 0

      - name: Upload Trivy image SARIF to GitHub Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Upload all Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-fs-report.json
            trivy-image-report.json
            trivy-fs.sarif
            trivy-image.sarif
            sbom.cdx.json

  # ================================================================
  # JOB 5 — DAST (OWASP ZAP) — optional
  # Runs after Trivy completes.
  # Only executes when enable-dast is set to true by the caller.
  # ================================================================
  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: sca-and-image
    if: ${{ always() && inputs.enable-dast }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install application dependencies
        # continue-on-error: true is set here because some caller repositories
        # have complex system-level dependencies (e.g. psycopg2 requires
        # libpq-dev) that cannot be installed in the GitHub Actions runner
        # without system package installation steps. In such cases the
        # application is started using a Docker-based start command instead,
        # which does not require a local pip install. This is not a workaround
        # for a broken installation — it is a deliberate design decision that
        # separates the pip install (optional convenience) from the application
        # start command (caller-defined and always correct).
        continue-on-error: true
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found — skipping dependency install" \
              >> $GITHUB_STEP_SUMMARY
          fi

      - name: Start application for DAST scanning
        run: |
          nohup ${{ inputs.app-start-command }} > app.log 2>&1 &
          echo "Waiting 15 seconds for application to start on port ${{ inputs.app-port }}..."
          sleep 15
          echo "Application startup log:"
          cat app.log || true
          curl -s -o /dev/null -w "HTTP status: %{http_code}\n" \
            http://localhost:${{ inputs.app-port }}/ || true

      - name: Run OWASP ZAP baseline scan via Docker
        # --user root: ensures ZAP container has write permission to mounted
        #              output directory on the GitHub Actions runner
        # --network host: allows ZAP container to reach the application running
        #                 on the runner's localhost
        # -I flag: do not exit with non-zero on alerts — findings are reported
        #          in the dashboard but the pipeline is not blocked by DAST
        run: |
          mkdir -p zap-output
          chmod 777 zap-output

          docker run --rm \
            --user root \
            --network host \
            -v "$(pwd)/zap-output:/zap/wrk/:rw" \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:${{ inputs.app-port }} \
            -J zap-report.json \
            -r zap-report.html \
            -I || true

          # If ZAP did not generate a report (e.g. API-only app with no HTML
          # pages to spider), create an empty placeholder so the artifact upload
          # always succeeds. The dashboard uses this to distinguish
          # "DAST ran — 0 alerts" from "DAST was not enabled".
          if [ ! -f zap-output/zap-report.json ]; then
            echo '{"site":[]}' > zap-output/zap-report.json
            echo "ℹ️ ZAP did not generate a report — empty placeholder created" \
              >> $GITHUB_STEP_SUMMARY
          fi

          echo "## 🔒 DAST (OWASP ZAP)" >> $GITHUB_STEP_SUMMARY

          ALERTS=$(python3 -c "
          import json
          try:
              data = json.load(open('zap-output/zap-report.json'))
              sites = data.get('site', [])
              total = sum(len(s.get('alerts', [])) for s in sites)
              print(total)
          except:
              print(0)
          " 2>/dev/null || echo "0")

          HIGH=$(python3 -c "
          import json
          try:
              data = json.load(open('zap-output/zap-report.json'))
              sites = data.get('site', [])
              total = sum(1 for s in sites
                          for a in s.get('alerts', [])
                          if a.get('riskcode') == '3')
              print(total)
          except:
              print(0)
          " 2>/dev/null || echo "0")

          MEDIUM=$(python3 -c "
          import json
          try:
              data = json.load(open('zap-output/zap-report.json'))
              sites = data.get('site', [])
              total = sum(1 for s in sites
                          for a in s.get('alerts', [])
                          if a.get('riskcode') == '2')
              print(total)
          except:
              print(0)
          " 2>/dev/null || echo "0")

          LOW=$(python3 -c "
          import json
          try:
              data = json.load(open('zap-output/zap-report.json'))
              sites = data.get('site', [])
              total = sum(1 for s in sites
                          for a in s.get('alerts', [])
                          if a.get('riskcode') == '1')
              print(total)
          except:
              print(0)
          " 2>/dev/null || echo "0")

          echo "| Risk | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 High   | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Medium | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔵 Low    | $LOW |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔍 **$ALERTS total alert type(s) detected by ZAP**" >> $GITHUB_STEP_SUMMARY

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            zap-output/zap-report.json
            zap-output/zap-report.html

  # ================================================================
  # JOB 6 — Generate Security Dashboard
  # Runs after all five scanning jobs complete.
  # Deploys to GitHub Pages of the calling repository.
  # ================================================================
  generate-dashboard:
    name: Generate Security Dashboard
    runs-on: ubuntu-latest
    needs: [ secret-scanning, iac-scanning, sast, sca-and-image, dast ]
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all scan reports
        uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Download generic dashboard generator from thesis repo
        run: |
          curl -sSfL \
            https://raw.githubusercontent.com/ananthu3212/shift-left-security-thesis/main/scripts/generate_generic_report.py \
            -o generate_generic_report.py

      - name: Generate security dashboard
        run: python3 generate_generic_report.py

      - name: Upload dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generic-security-dashboard
          path: generic-dashboard/index.html

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: generic-dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Show dashboard link
        if: always()
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          PAGES_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/"
          echo "## 🌐 Security Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 **[View Security Dashboard](${PAGES_URL})**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> If the link is not yet live, download the \`generic-security-dashboard\` artifact above." \
            >> $GITHUB_STEP_SUMMARY