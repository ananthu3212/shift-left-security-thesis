# ================================================================
# security-scan-reusable.yml
#
# Reusable Shift-Left Security Pipeline
#
# This workflow can be called from ANY repository to integrate
# SAST, SCA, and Secret Scanning into an existing CI/CD pipeline.
#
# Usage in any project:
#
#   jobs:
#     security:
#       uses: ananthu3212/shift-left-security-thesis/.github/workflows/security-scan-reusable.yml@main
#       with:
#         docker-image-name: my-app:latest
#         semgrep-config: p/python
#         trivy-severity: HIGH,CRITICAL
#
# Thesis: Shift-Left Security in CI/CD Pipelines
# Author: Ananthu Chandra Babu
# University: Westfälische Hochschule Gelsenkirchen, 2026
# ================================================================

name: Shift-Left Security Scan (Reusable)

on:
  workflow_call:
    inputs:

      docker-image-name:
        description: >
          Name for the Docker image to build and scan.
          Example: my-flask-app:latest
        required: true
        type: string

      semgrep-config:
        description: >
          Primary Semgrep ruleset to apply.
          Examples: p/python, p/javascript, p/security-audit, p/owasp-top-ten
        required: false
        type: string
        default: 'p/python'

      custom-rules-path:
        description: >
          Path to a directory containing custom Semgrep rule files (.yaml).
          Leave empty to skip custom rules and use only the primary config.
          Example: rules/
        required: false
        type: string
        default: ''

      trivy-severity:
        description: >
          Comma-separated severity levels Trivy should report and block on.
          Options: CRITICAL, HIGH, MEDIUM, LOW
          Lower thresholds increase coverage but may increase noise.
        required: false
        type: string
        default: 'HIGH,CRITICAL'

      fail-on-findings:
        description: >
          Whether to exit with code 1 (blocking the pipeline) when
          security findings are detected. Set to false to run in
          audit-only mode without blocking deployment.
        required: false
        type: boolean
        default: true

    outputs:
      semgrep-findings:
        description: 'Number of Semgrep findings detected'
        value: ${{ jobs.sast.outputs.findings-count }}
      gitleaks-findings:
        description: 'Number of secrets detected by Gitleaks'
        value: ${{ jobs.secret-scanning.outputs.findings-count }}

permissions:
  security-events: write
  contents: read

jobs:
  # ================================================================
  # JOB 1: Secret Scanning — Gitleaks
  # Scans full git history for hardcoded secrets, API keys,
  # credentials and tokens. Runs first because a leaked secret
  # is the highest-priority finding — no point scanning code
  # that already has credentials exposed.
  # ================================================================
  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    outputs:
      findings-count: ${{ steps.count.outputs.count }}

    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        id: gitleaks
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz

          ./gitleaks detect \
            --source . \
            --verbose \
            --report-format json \
            --report-path gitleaks-report.json || true

      - name: Count findings and write summary
        id: count
        run: |
          COUNT=$(python3 -c "
          import json, os
          try:
              data = json.load(open('gitleaks-report.json'))
              print(len(data))
          except:
              print(0)
          ")
          echo "count=$COUNT" >> $GITHUB_OUTPUT

          echo "## 🔑 Secret Scanning (Gitleaks)" >> $GITHUB_STEP_SUMMARY
          if [ "$COUNT" -eq 0 ]; then
            echo "✅ No secrets detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **$COUNT secret(s) detected**" >> $GITHUB_STEP_SUMMARY
            if [ "${{ inputs.fail-on-findings }}" = "true" ]; then
              echo "Pipeline blocked." >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ Running in audit-only mode — pipeline not blocked." >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Block pipeline if findings exist
        if: ${{ inputs.fail-on-findings }}
        run: |
          COUNT=${{ steps.count.outputs.count }}
          if [ "$COUNT" -gt 0 ]; then
            echo "Gitleaks detected $COUNT secret(s). Blocking pipeline."
            exit 1
          fi

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  # ================================================================
  # JOB 2: SAST — Semgrep
  # Static Application Security Testing on source code.
  # Runs the primary config (e.g. p/python) and optionally
  # a custom rules directory provided by the caller.
  # Custom rules allow project-specific vulnerability patterns
  # beyond what community rulesets cover.
  # ================================================================
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: secret-scanning
    if: always()
    outputs:
      findings-count: ${{ steps.count.outputs.count }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Semgrep config string
        id: config
        run: |
          CONFIG="--config=${{ inputs.semgrep-config }}"
          if [ -n "${{ inputs.custom-rules-path }}" ] && [ -d "${{ inputs.custom-rules-path }}" ]; then
            CONFIG="$CONFIG --config=${{ inputs.custom-rules-path }}"
            echo "Custom rules found at ${{ inputs.custom-rules-path }} — included in scan"
          else
            echo "No custom rules path provided or directory not found — using primary config only"
          fi
          echo "config=$CONFIG" >> $GITHUB_OUTPUT

      - name: Run Semgrep — SARIF output
        run: |
          pip install semgrep --quiet
          semgrep ${{ steps.config.outputs.config }} --sarif -o semgrep.sarif . || true

      - name: Run Semgrep — JSON output
        run: |
          semgrep ${{ steps.config.outputs.config }} --json -o semgrep-report.json . || true

      - name: Count findings and write summary
        id: count
        run: |
          COUNT=$(python3 -c "
          import json
          try:
              data = json.load(open('semgrep-report.json'))
              print(len(data.get('results', [])))
          except:
              print(0)
          ")
          echo "count=$COUNT" >> $GITHUB_OUTPUT

          echo "## 🔍 SAST (Semgrep)" >> $GITHUB_STEP_SUMMARY
          echo "Config: \`${{ inputs.semgrep-config }}\`" >> $GITHUB_STEP_SUMMARY

          if [ "$COUNT" -eq 0 ]; then
            echo "✅ No findings detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **$COUNT finding(s) detected**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Rule | File | Line |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          data = json.load(open('semgrep-report.json'))
          for r in data.get('results', []):
              rule = r['check_id'].split('.')[-1]
              path = r['path']
              line = r['start']['line']
              print(f'| {rule} | \`{path}\` | {line} |')
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          fi

      - name: Upload Semgrep SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: |
            semgrep-report.json
            semgrep.sarif

      - name: Block pipeline if findings exist
        if: ${{ inputs.fail-on-findings }}
        run: |
          COUNT=${{ steps.count.outputs.count }}
          if [ "$COUNT" -gt 0 ]; then
            echo "Semgrep detected $COUNT finding(s). Blocking pipeline."
            exit 1
          fi

  # ================================================================
  # JOB 3: SCA + Container Image Scan — Trivy
  # Software Composition Analysis on dependencies and
  # container image scanning for OS-level CVEs.
  # Runs after SAST because it requires building the Docker image.
  # The severity threshold is configurable — lower thresholds
  # catch more CVEs but increase alert noise.
  # ================================================================
  sca-and-image:
    name: SCA + Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: sast
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ inputs.docker-image-name }} .

      - name: Run Trivy filesystem scan — JSON
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-fs-report.json
          severity: ${{ inputs.trivy-severity }}
          exit-code: 0

      - name: Run Trivy filesystem scan — SARIF
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: ${{ inputs.trivy-severity }}
          exit-code: 0

      - name: Upload Trivy FS SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      - name: Run Trivy image scan — JSON
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.docker-image-name }}
          format: json
          output: trivy-image-report.json
          severity: ${{ inputs.trivy-severity }}
          exit-code: 0

      - name: Run Trivy image scan — SARIF
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.docker-image-name }}
          format: sarif
          output: trivy-image.sarif
          severity: ${{ inputs.trivy-severity }}
          exit-code: 0

      - name: Upload Trivy image SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Write Trivy summary and check findings
        if: always()
        run: |
          echo "## 📦 SCA + Image Scan (Trivy)" >> $GITHUB_STEP_SUMMARY
          echo "Severity threshold: \`${{ inputs.trivy-severity }}\`" >> $GITHUB_STEP_SUMMARY

          FS_CRITICAL=$(python3 -c "
          import json
          data = json.load(open('trivy-fs-report.json'))
          vulns = [v for r in data.get('Results', []) for v in (r.get('Vulnerabilities') or []) if v.get('Severity') == 'CRITICAL']
          print(len(vulns))" 2>/dev/null || echo "0")

          FS_HIGH=$(python3 -c "
          import json
          data = json.load(open('trivy-fs-report.json'))
          vulns = [v for r in data.get('Results', []) for v in (r.get('Vulnerabilities') or []) if v.get('Severity') == 'HIGH']
          print(len(vulns))" 2>/dev/null || echo "0")

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 CRITICAL | $FS_CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 HIGH     | $FS_HIGH |" >> $GITHUB_STEP_SUMMARY

          TOTAL=$((FS_CRITICAL + FS_HIGH))
          if [ $TOTAL -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **$TOTAL finding(s) detected**" >> $GITHUB_STEP_SUMMARY
            if [ "${{ inputs.fail-on-findings }}" = "true" ]; then
              exit 1
            else
              echo "⚠️ Running in audit-only mode — pipeline not blocked." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "✅ No findings at this severity threshold" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-fs-report.json
            trivy-image-report.json
            trivy-fs.sarif
            trivy-image.sarif