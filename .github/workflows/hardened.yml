# ================================================================
# hardened.yml — Hardened Sequential Security Pipeline
#
# Thesis artefact 2 of 4.
# Five security tools in staged sequential execution:
#   Stage 1: Secret Scanning (Gitleaks) + IaC Scan (tfsec) — parallel
#   Stage 2: SAST (Semgrep)            — after Stage 1
#   Stage 3: SCA + Image Scan (Trivy)  — after Stage 2
#   Stage 4: DAST (OWASP ZAP)          — after Stage 3
#   Stage 5: Security Dashboard        — after Stage 4
#
# Used for security detection evaluation AND runtime measurement (n=10).
#
# Thesis: Shift-Left Security in CI/CD Pipelines
# Author: Ananthu Chandra Babu
# University: Westfälische Hochschule Gelsenkirchen, 2026
# ================================================================

name: Hardened Pipeline (Sequential — SAST + SCA + Secrets + IaC + DAST)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_note:
        description: 'Note for this run (e.g. n=10 statistical run 1)'
        required: false
        default: 'Manual run'

permissions:
  security-events: write
  contents: read
  pages: write
  id-token: write

jobs:

  # ================================================================
  # STAGE 1a — Secret Scanning (Gitleaks)
  # Runs in parallel with tfsec. No dependencies.
  # ================================================================
  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks with custom Flask config
        # Pinned to v8.18.4 — version used during thesis evaluation.
        # Uses .gitleaks.toml from the flask-webgoat repository root.
        # This config adds Flask application-level secret detection
        # (flask-hardcoded-secret-key) on top of the default Gitleaks rules.
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz

          ./gitleaks detect --source . -v \
            --config .gitleaks.toml \
            --report-format json \
            --report-path gitleaks-report.json
          exit_code=$?

          echo "## 🔑 Secret Scanning (Gitleaks)" >> $GITHUB_STEP_SUMMARY
          if [ $exit_code -eq 0 ]; then
            echo "✅ No secrets detected" >> $GITHUB_STEP_SUMMARY
          else
            COUNT=$(python3 -c "
          import json
          data = json.load(open('gitleaks-report.json'))
          print(len(data))" 2>/dev/null || echo "1+")
            echo "❌ **$COUNT secret(s) detected** — pipeline blocked" >> $GITHUB_STEP_SUMMARY
          fi

          exit $exit_code

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  # ================================================================
  # STAGE 1b — IaC Security Scan (tfsec)
  # Runs in parallel with Gitleaks. No dependencies.
  # ================================================================
  iac-scanning:
    name: IaC Security Scan (tfsec)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec on Terraform infrastructure
        # Pinned to v1.28.11 — version used during thesis evaluation.
        # --soft-fail: tfsec returns exit 0 so findings are reported
        # without blocking this job. Pipeline gate logic is handled
        # in the step summary below.
        run: |
          curl -sSfL \
            https://github.com/aquasecurity/tfsec/releases/download/v1.28.11/tfsec-linux-amd64 \
            -o tfsec
          chmod +x tfsec

          ./tfsec terraform/ \
            --format json \
            --out tfsec-report.json \
            --soft-fail || true

          echo "## 🏗️ IaC Security Scan (tfsec)" >> $GITHUB_STEP_SUMMARY

          CRITICAL=$(python3 -c "
          import json
          try:
              data = json.load(open('tfsec-report.json'))
              results = data.get('results') or []
              print(sum(1 for r in results if r.get('severity') == 'CRITICAL'))
          except:
              print(0)" 2>/dev/null || echo "0")

          HIGH=$(python3 -c "
          import json
          try:
              data = json.load(open('tfsec-report.json'))
              results = data.get('results') or []
              print(sum(1 for r in results if r.get('severity') == 'HIGH'))
          except:
              print(0)" 2>/dev/null || echo "0")

          MEDIUM=$(python3 -c "
          import json
          try:
              data = json.load(open('tfsec-report.json'))
              results = data.get('results') or []
              print(sum(1 for r in results if r.get('severity') == 'MEDIUM'))
          except:
              print(0)" 2>/dev/null || echo "0")

          LOW=$(python3 -c "
          import json
          try:
              data = json.load(open('tfsec-report.json'))
              results = data.get('results') or []
              print(sum(1 for r in results if r.get('severity') == 'LOW'))
          except:
              print(0)" 2>/dev/null || echo "0")

          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 CRITICAL | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 HIGH     | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 MEDIUM   | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔵 LOW      | $LOW |" >> $GITHUB_STEP_SUMMARY

          TOTAL=$((CRITICAL + HIGH))
          if [ $TOTAL -gt 0 ]; then
            echo "❌ **$TOTAL CRITICAL/HIGH IaC misconfiguration(s) detected**" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No CRITICAL/HIGH IaC misconfigurations detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload tfsec report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfsec-report
          path: tfsec-report.json

  # ================================================================
  # STAGE 2 — SAST (Semgrep)
  # Runs after both Stage 1 jobs complete.
  # ================================================================
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: [ secret-scanning, iac-scanning ]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep with default and custom rules
        # Pinned to v1.162.0 — version used during thesis evaluation.
        # Loads two rule sets:
        #   p/python        — default Semgrep Python ruleset
        #   rules/          — 9 custom Flask-specific rules from this repository
        # Of the 9 custom rules, 7 fire on flask-webgoat (V04-V10 in ground truth).
        # The remaining 2 (ssti-fstring, jwt-insecure-decode) target patterns
        # not present in flask-webgoat but valid for other Flask applications.
        run: |
          pip install semgrep==1.162.0

          semgrep \
            --config=p/python \
            --config=rules/ \
            --sarif -o semgrep.sarif . || true

          semgrep \
            --config=p/python \
            --config=rules/ \
            --json -o semgrep-report.json \
            --error .
          SEMGREP_EXIT=$?

          echo "## 🔍 SAST (Semgrep)" >> $GITHUB_STEP_SUMMARY

          FINDINGS=$(python3 -c "
          import json
          data = json.load(open('semgrep-report.json'))
          print(len(data.get('results', [])))" 2>/dev/null || echo "unknown")

          if [ $SEMGREP_EXIT -eq 0 ]; then
            echo "✅ No findings detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **$FINDINGS finding(s) detected** — pipeline blocked" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Rule | File | Line |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          data = json.load(open('semgrep-report.json'))
          for r in data.get('results', []):
              rule = r['check_id'].split('.')[-1]
              path = r['path']
              line = r['start']['line']
              print(f'| {rule} | \`{path}\` | {line} |')
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          fi

          exit $SEMGREP_EXIT

      - name: Upload Semgrep SARIF to GitHub Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: |
            semgrep-report.json
            semgrep.sarif

  # ================================================================
  # STAGE 3 — SCA + Image Scan (Trivy)
  # Runs after Semgrep completes.
  #
  # ARCHITECTURAL DECISION — FS scan runs BEFORE Docker build:
  # Trivy FS scan reads requirements.txt and pyproject.toml directly
  # from the repository. It does not need a Docker image.
  # Placing the FS scan first guarantees CVE detection succeeds
  # regardless of whether the Docker build completes.
  # Docker build and image scan run afterwards as additional analysis.
  # This is the correct architectural fix — not continue-on-error.
  # ================================================================
  sca-and-image:
    name: SCA + Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: sast
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 1: Filesystem scan — NO Docker dependency ────────────
      - name: Run Trivy filesystem scan — JSON
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-fs-report.json
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Run Trivy filesystem scan — SARIF
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Upload Trivy FS SARIF to GitHub Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      # ── Step 2: SBOM — NO Docker dependency ──────────────────────
      - name: Generate CycloneDX SBOM
        # CycloneDX format chosen for broad tooling support
        # and OWASP standardisation. Generated from filesystem
        # to ensure SBOM is always produced regardless of
        # Docker build outcome.
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.cdx.json
          exit-code: 0

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json

      # ── Step 3: Report FS findings ────────────────────────────────
      - name: Write Trivy FS summary and check findings
        if: always()
        run: |
          echo "## 📦 SCA + Image Scan (Trivy)" >> $GITHUB_STEP_SUMMARY
          echo "Severity threshold: HIGH, CRITICAL" >> $GITHUB_STEP_SUMMARY

          FS_CRITICAL=$(python3 -c "
          import json
          data = json.load(open('trivy-fs-report.json'))
          vulns = [v for r in data.get('Results', [])
                   for v in (r.get('Vulnerabilities') or [])
                   if v.get('Severity') == 'CRITICAL']
          print(len(vulns))" 2>/dev/null || echo "0")

          FS_HIGH=$(python3 -c "
          import json
          data = json.load(open('trivy-fs-report.json'))
          vulns = [v for r in data.get('Results', [])
                   for v in (r.get('Vulnerabilities') or [])
                   if v.get('Severity') == 'HIGH']
          print(len(vulns))" 2>/dev/null || echo "0")

          echo "### Filesystem Scan (Dependencies)" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 CRITICAL | $FS_CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 HIGH     | $FS_HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 **SBOM generated:** CycloneDX format — artifact \`sbom-cyclonedx\`" >> $GITHUB_STEP_SUMMARY

          TOTAL=$((FS_CRITICAL + FS_HIGH))
          if [ $TOTAL -gt 0 ]; then
            echo "❌ **$TOTAL HIGH/CRITICAL CVE(s) detected** — pipeline blocked" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ No HIGH/CRITICAL findings" >> $GITHUB_STEP_SUMMARY
          fi

      # ── Step 4: Docker build — AFTER FS scan ─────────────────────
      - name: Build Docker image
        run: docker build -t flask-webgoat:hardened .

      # ── Step 5: Image scan — AFTER Docker build ───────────────────
      - name: Run Trivy image scan — JSON
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: flask-webgoat:hardened
          format: json
          output: trivy-image-report.json
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Run Trivy image scan — SARIF
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: flask-webgoat:hardened
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Upload Trivy image SARIF to GitHub Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Upload all Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-fs-report.json
            trivy-image-report.json
            trivy-fs.sarif
            trivy-image.sarif
            sbom.cdx.json

  # ================================================================
  # STAGE 4 — DAST (OWASP ZAP)
  # Runs after Trivy completes.
  # Starts flask-webgoat on the runner and performs baseline scan.
  # -I flag: ZAP findings are reported but do not block the pipeline.
  # ================================================================
  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: sca-and-image
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Flask application dependencies
        run: pip install -r requirements.txt

      - name: Start flask-webgoat for dynamic scanning
        # debug=True is intentionally set in run.py (ground truth item V10).
        # ZAP scans the application as deployed — including this misconfiguration.
        run: |
          nohup python run.py > flask.log 2>&1 &
          echo "Waiting 15 seconds for Flask to start on port 5000..."
          sleep 15
          echo "Flask startup log:"
          cat flask.log || true
          curl -s -o /dev/null -w "Flask HTTP status: %{http_code}\n" \
            http://localhost:5000/login || true

      - name: Run OWASP ZAP baseline scan via Docker
        # --user root: ZAP container requires write access to mounted output dir
        # --network host: allows ZAP container to reach Flask on runner localhost
        # -I flag: report findings but do not block — ZAP is informational in
        #          this pipeline. Findings are reported in the dashboard.
        # Trivy uses latest CVE database on each run — intentional design.
        # ZAP version is not pinned — zaproxy:stable tracks latest stable release.
        # Both documented as threats to validity in the thesis evaluation chapter.
        run: |
          mkdir -p zap-output
          chmod 777 zap-output

          docker run --rm \
            --user root \
            --network host \
            -v "$(pwd)/zap-output:/zap/wrk/:rw" \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:5000 \
            -J zap-report.json \
            -r zap-report.html \
            -I || true

          if [ ! -f zap-output/zap-report.json ]; then
            echo '{"site":[]}' > zap-output/zap-report.json
          fi

          echo "## 🔒 DAST (OWASP ZAP)" >> $GITHUB_STEP_SUMMARY

          ALERTS=$(python3 -c "
          import json
          try:
              data = json.load(open('zap-output/zap-report.json'))
              sites = data.get('site', [])
              total = sum(len(s.get('alerts', [])) for s in sites)
              print(total)
          except:
              print(0)
          " 2>/dev/null || echo "0")

          HIGH=$(python3 -c "
          import json
          try:
              data = json.load(open('zap-output/zap-report.json'))
              sites = data.get('site', [])
              total = sum(1 for s in sites for a in s.get('alerts', []) if a.get('riskcode') == '3')
              print(total)
          except:
              print(0)
          " 2>/dev/null || echo "0")

          MEDIUM=$(python3 -c "
          import json
          try:
              data = json.load(open('zap-output/zap-report.json'))
              sites = data.get('site', [])
              total = sum(1 for s in sites for a in s.get('alerts', []) if a.get('riskcode') == '2')
              print(total)
          except:
              print(0)
          " 2>/dev/null || echo "0")

          LOW=$(python3 -c "
          import json
          try:
              data = json.load(open('zap-output/zap-report.json'))
              sites = data.get('site', [])
              total = sum(1 for s in sites for a in s.get('alerts', []) if a.get('riskcode') == '1')
              print(total)
          except:
              print(0)
          " 2>/dev/null || echo "0")

          echo "| Risk | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 High   | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Medium | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔵 Low    | $LOW |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔍 **$ALERTS total alert type(s) detected by ZAP**" >> $GITHUB_STEP_SUMMARY

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            zap-output/zap-report.json
            zap-output/zap-report.html

  # ================================================================
  # STAGE 5 — Generate Security Dashboard
  # Runs after all five scanning jobs complete.
  # Deploys thesis dashboard to GitHub Pages.
  # ================================================================
  generate-dashboard:
    name: Generate Security Dashboard
    runs-on: ubuntu-latest
    needs: [ secret-scanning, iac-scanning, sast, sca-and-image, dast ]
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all scan reports
        uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Generate thesis evaluation dashboard
        run: python3 scripts/generate_report.py

      - name: Generate generic findings dashboard
        run: python3 scripts/generate_generic_report.py

      - name: Upload generic dashboard as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generic-security-dashboard
          path: generic-dashboard/index.html

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Write dashboard link to summary
        if: always()
        run: |
          echo "## 🌐 Security Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "**https://ananthu3212.github.io/shift-left-security-thesis/**" >> $GITHUB_STEP_SUMMARY