name: Hardened Pipeline (SAST + SCA + Secret Scanning + DAST)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_note:
        description: 'Note for this run (e.g. statistical run 1 of 10)'
        required: false
        default: 'Manual statistical run'

permissions:
  security-events: write
  contents: read
  pages: write
  id-token: write

jobs:
  # ================================================================
  # JOB 1 — Secret Scanning
  # ================================================================
  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        # Pinned to v8.18.4 — version used during thesis evaluation
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz
          ./gitleaks detect --source . -v --report-format json --report-path gitleaks-report.json
          exit_code=$?

          echo "## 🔑 Secret Scanning (Gitleaks)" >> $GITHUB_STEP_SUMMARY
          if [ $exit_code -eq 0 ]; then
            echo "✅ No secrets detected" >> $GITHUB_STEP_SUMMARY
          else
            COUNT=$(python3 -c "import json; data=json.load(open('gitleaks-report.json')); print(len(data))" 2>/dev/null || echo "1+")
            echo "❌ **$COUNT secret(s) detected** — pipeline blocked" >> $GITHUB_STEP_SUMMARY
          fi

          exit $exit_code

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  # ================================================================
  # JOB 2 — IaC Security Scan
  # ================================================================
  iac-scanning:
    name: IaC Security Scan (tfsec)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec on Terraform infrastructure
        # Pinned to v1.28.11 — version used during thesis evaluation
        run: |
          curl -sSfL https://github.com/aquasecurity/tfsec/releases/download/v1.28.11/tfsec-linux-amd64 -o tfsec
          chmod +x tfsec

          ./tfsec terraform/ \
            --format json \
            --out tfsec-report.json \
            --soft-fail || true

          echo "## 🏗️ IaC Security Scan (tfsec)" >> $GITHUB_STEP_SUMMARY

          CRITICAL=$(python3 -c "
          import json
          try:
              data = json.load(open('tfsec-report.json'))
              results = data.get('results') or []
              print(sum(1 for r in results if r.get('severity') == 'CRITICAL'))
          except:
              print(0)" 2>/dev/null || echo "0")

          HIGH=$(python3 -c "
          import json
          try:
              data = json.load(open('tfsec-report.json'))
              results = data.get('results') or []
              print(sum(1 for r in results if r.get('severity') == 'HIGH'))
          except:
              print(0)" 2>/dev/null || echo "0")

          MEDIUM=$(python3 -c "
          import json
          try:
              data = json.load(open('tfsec-report.json'))
              results = data.get('results') or []
              print(sum(1 for r in results if r.get('severity') == 'MEDIUM'))
          except:
              print(0)" 2>/dev/null || echo "0")

          LOW=$(python3 -c "
          import json
          try:
              data = json.load(open('tfsec-report.json'))
              results = data.get('results') or []
              print(sum(1 for r in results if r.get('severity') == 'LOW'))
          except:
              print(0)" 2>/dev/null || echo "0")

          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 CRITICAL | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 HIGH     | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 MEDIUM   | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔵 LOW      | $LOW |" >> $GITHUB_STEP_SUMMARY

          TOTAL=$((CRITICAL + HIGH))
          if [ $TOTAL -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **$TOTAL CRITICAL/HIGH IaC misconfiguration(s) detected**" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No CRITICAL/HIGH IaC misconfigurations detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload tfsec report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfsec-report
          path: tfsec-report.json

  # ================================================================
  # JOB 3 — SAST
  # ================================================================
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: [secret-scanning, iac-scanning]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep with default and custom rules
        # Pinned to v1.162.0 — version used during thesis evaluation
        run: |
          pip install semgrep==1.162.0

          semgrep --config=p/python --config=rules/ --sarif -o semgrep.sarif . || true

          semgrep --config=p/python --config=rules/ --json -o semgrep-report.json --error .
          SEMGREP_EXIT=$?

          echo "## 🔍 SAST (Semgrep)" >> $GITHUB_STEP_SUMMARY
          FINDINGS=$(python3 -c "import json; data=json.load(open('semgrep-report.json')); print(len(data.get('results', [])))" 2>/dev/null || echo "unknown")
          if [ $SEMGREP_EXIT -eq 0 ]; then
            echo "✅ No findings detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **$FINDINGS finding(s) detected** — pipeline blocked" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Rule | File | Line |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          data = json.load(open('semgrep-report.json'))
          for r in data.get('results', []):
              rule = r['check_id'].split('.')[-1]
              path = r['path']
              line = r['start']['line']
              print(f'| {rule} | \`{path}\` | {line} |')
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          fi

          exit $SEMGREP_EXIT

      - name: Upload Semgrep SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: |
            semgrep-report.json
            semgrep.sarif

  # ================================================================
  # JOB 4 — SCA + Image Scan
  # ================================================================
  sca-and-image:
    name: SCA + Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: sast
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t flask-webgoat:hardened .

      # Trivy uses latest CVE database on each run — intentional design decision.
      # SCA results are inherently database-dependent and cannot be fully pinned.
      # This is documented as a threat to validity in the thesis evaluation chapter.
      - name: Run Trivy filesystem scan — JSON
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-fs-report.json
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Run Trivy filesystem scan — SARIF
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Upload Trivy FS SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      - name: Run Trivy image scan — JSON
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: flask-webgoat:hardened
          format: json
          output: trivy-image-report.json
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Run Trivy image scan — SARIF
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: flask-webgoat:hardened
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Upload Trivy image SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Generate CycloneDX SBOM
        # CycloneDX format chosen for broad tooling support and OWASP standardisation.
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.cdx.json
          exit-code: 0

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json

      - name: Write Trivy step summary and check findings
        if: always()
        run: |
          echo "## 📦 SCA + Image Scan (Trivy)" >> $GITHUB_STEP_SUMMARY

          FS_CRITICAL=$(python3 -c "
          import json
          data = json.load(open('trivy-fs-report.json'))
          vulns = [v for r in data.get('Results', []) for v in (r.get('Vulnerabilities') or []) if v.get('Severity') == 'CRITICAL']
          print(len(vulns))" 2>/dev/null || echo "0")

          FS_HIGH=$(python3 -c "
          import json
          data = json.load(open('trivy-fs-report.json'))
          vulns = [v for r in data.get('Results', []) for v in (r.get('Vulnerabilities') or []) if v.get('Severity') == 'HIGH']
          print(len(vulns))" 2>/dev/null || echo "0")

          echo "### Filesystem (Dependencies)" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 CRITICAL | $FS_CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 HIGH     | $FS_HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 **SBOM generated:** CycloneDX format — available as artifact \`sbom-cyclonedx\`" >> $GITHUB_STEP_SUMMARY

          TOTAL=$((FS_CRITICAL + FS_HIGH))
          if [ $TOTAL -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **$TOTAL HIGH/CRITICAL CVE(s) detected** — pipeline blocked" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ No HIGH/CRITICAL findings" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-fs-report.json
            trivy-image-report.json
            trivy-fs.sarif
            trivy-image.sarif
            sbom.cdx.json

  # ================================================================
  # JOB 5 — DAST (OWASP ZAP)
  # ================================================================
  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: sca-and-image
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Flask application dependencies
        run: pip install -r requirements.txt

      - name: Start Flask application for dynamic scanning
        # Starts flask-webgoat directly on the runner at port 5000.
        # debug=True is already set in run.py (ground truth item V10).
        # The application intentionally contains vulnerabilities for
        # DAST evaluation — this is the purpose of the thesis target.
        run: |
          nohup python run.py > flask.log 2>&1 &
          echo "Waiting 15 seconds for Flask to start..."
          sleep 15
          echo "Flask startup log:"
          cat flask.log || true
          echo "Probing Flask application..."
          curl -s -o /dev/null -w "HTTP status: %{http_code}\n" \
            http://localhost:5000/login || true

      - name: Get Docker bridge IP for ZAP container access
        # ZAP runs inside its own Docker container and cannot reach
        # localhost of the runner host directly. The Docker bridge
        # interface IP is used instead, which is reachable from
        # within the ZAP container.
        run: |
          BRIDGE_IP=$(ip addr show docker0 \
            | grep -oP '(?<=inet )\d+\.\d+\.\d+\.\d+')
          if [ -z "$BRIDGE_IP" ]; then
            BRIDGE_IP=$(ip route | grep default | awk '{print $3}')
          fi
          echo "BRIDGE_IP=$BRIDGE_IP" >> $GITHUB_ENV
          echo "ZAP target URL: http://$BRIDGE_IP:5000"

      - name: Run OWASP ZAP Baseline Scan
        # Baseline scan mode: probes for common vulnerabilities
        # without aggressive active attacks. Suitable for CI/CD
        # integration. fail_action: false ensures findings are
        # reported without blocking the pipeline during evaluation.
        uses: zaproxy/action-baseline-scan@v0.12.0
        with:
          target: 'http://${{ env.BRIDGE_IP }}:5000'
          fail_action: false
          cmd_options: '-a -j'
        continue-on-error: true

      - name: Write ZAP step summary
        if: always()
        run: |
          echo "## 🔒 DAST (OWASP ZAP)" >> $GITHUB_STEP_SUMMARY
          echo "Target: http://${{ env.BRIDGE_IP }}:5000" >> $GITHUB_STEP_SUMMARY
          if [ -f report_json.json ]; then
            ALERTS=$(python3 -c "
          import json
          try:
              data = json.load(open('report_json.json'))
              sites = data.get('site', [])
              total = sum(len(s.get('alerts', [])) for s in sites)
              print(total)
          except Exception as e:
              print(0)" 2>/dev/null || echo "0")
            echo "🔍 **$ALERTS alert(s) detected**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ ZAP report not found — check ZAP execution log" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_json.json
            report_html.html
            report_md.md

  # ================================================================
  # JOB 6 — Generate Security Dashboard
  # ================================================================
  generate-dashboard:
    name: Generate Security Dashboard
    runs-on: ubuntu-latest
    needs: [secret-scanning, iac-scanning, sast, sca-and-image, dast]
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all scan reports
        uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Generate thesis evaluation dashboard
        run: python3 scripts/generate_report.py

      - name: Generate generic findings dashboard
        run: python3 scripts/generate_generic_report.py

      - name: Write dashboard link to summary
        run: |
          echo "## 🌐 Security Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "Thesis evaluation dashboard published at:" >> $GITHUB_STEP_SUMMARY
          echo "**https://ananthu3212.github.io/shift-left-security-thesis/**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generic findings dashboard available as artifact: \`generic-security-dashboard\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload generic dashboard as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generic-security-dashboard
          path: generic-dashboard/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4