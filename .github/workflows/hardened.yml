name: Hardened Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  secret-and-iac:
    name: Secrets & IaC (Gitleaks + tfsec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download custom Gitleaks config
        run: |
          curl -f -o .gitleaks.toml \
            https://raw.githubusercontent.com/ananthu3212/shift-left-security-thesis/main/.gitleaks.toml || true

      - name: Run Gitleaks
        run: |
          set +e
          docker run --rm \
            -v "$(pwd):/repo" \
            zricethezav/gitleaks:latest \
            detect \
            --source /repo \
            --config /repo/.gitleaks.toml \
            --report-format json \
            --report-path /repo/gitleaks-report.json \
            --redact \
            --no-git
          set -e

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: warn

      - name: Run tfsec
        run: |
          mkdir -p tfsec-report
          docker run --rm \
            -v "$(pwd):/src" \
            aquasec/tfsec:latest \
            /src \
            --format json \
            --out /src/tfsec-report/tfsec-report.json || true

      - name: Upload tfsec report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfsec-report
          path: tfsec-report/tfsec-report.json
          if-no-files-found: warn

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep --quiet
          mkdir -p semgrep-report
          semgrep scan \
            --config "p/python" \
            --config "p/flask" \
            --config "p/owasp-top-ten" \
            --config rules/ \
            --json \
            --output semgrep-report/semgrep-report.json \
            . || true

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report/semgrep-report.json
          if-no-files-found: warn

  sca-and-image:
    name: SCA (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        run: |
          mkdir -p trivy-reports
          docker run --rm \
            -v "$(pwd):/project" \
            aquasec/trivy:latest \
            fs /project \
            --format json \
            --output /project/trivy-reports/trivy-fs-report.json \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --quiet || true

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: trivy-reports/trivy-fs-report.json
          if-no-files-found: warn

  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: sca-and-image
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start Flask app
        run: |
          nohup python run.py > flask.log 2>&1 &
          sleep 15
          cat flask.log || true
          curl -s -o /dev/null -w "Flask status: %{http_code}\n" http://localhost:5000/login || true

      - name: Run OWASP ZAP baseline scan
        run: |
          mkdir -p zap-output
          chmod 777 zap-output

          docker run --rm \
            --user root \
            --network host \
            -v "$(pwd)/zap-output:/zap/wrk/:rw" \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:5000 \
            -J zap-report.json \
            -r zap-report.html \
            -I || true

          echo "=== zap-output contents ==="
          ls -la zap-output/

          if [ ! -f zap-output/zap-report.json ] || [ ! -s zap-output/zap-report.json ]; then
            echo '{"site": []}' > zap-output/zap-report.json
            echo "WARNING: ZAP report missing — placeholder created"
          fi

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            zap-output/zap-report.json
            zap-output/zap-report.html
          if-no-files-found: warn

  generate-dashboard:
    name: Generate Dashboard
    runs-on: ubuntu-latest
    needs: [secret-and-iac, sast, sca-and-image, dast]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all scan reports
        uses: actions/download-artifact@v4
        with:
          path: reports/
          pattern: '*'
          merge-multiple: true

      - name: Debug — show downloaded reports
        run: find reports/ -type f | sort

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Generate dashboard
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/generate_generic_report.py

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: generic-security-dashboard
          path: generic-dashboard/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./generic-dashboard
          publish_branch: gh-pages
          force_orphan: true