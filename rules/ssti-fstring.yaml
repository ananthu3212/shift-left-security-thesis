rules:
  - id: flask-ssti-dynamic-template
    patterns:
      - pattern: render_template_string($TEMPLATE, ...)
      - pattern-not: render_template_string("...", ...)
    message: >
      Potential SSTI: render_template_string is called with a dynamically
      constructed template rather than a plain string literal. If the template
      contains user-controlled data, an attacker can inject Jinja2 template
      syntax to execute arbitrary code on the server. Use render_template()
      with a static template file instead, or sanitize all user input before
      passing it to render_template_string.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-94
      owasp: A03:2021 - Injection
      category: security
      technology:
        - flask