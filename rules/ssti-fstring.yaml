rules:
  - id: flask-ssti-fstring-render
    pattern-either:
      - pattern: render_template_string("..." + ..., ...)
      - pattern: render_template_string("..." % ..., ...)
      - pattern: |
          $T = "..." + ...
          render_template_string($T, ...)
      - pattern: |
          $T = "..." % ...
          render_template_string($T, ...)
    message: >
      Potential Server-Side Template Injection (SSTI): render_template_string
      is called with a string built via concatenation or formatting from
      user-controlled data. An attacker can inject Jinja2 template syntax
      to execute arbitrary code on the server. Use render_template() with a
      static template file, or sanitize all user input before passing it to
      render_template_string.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-94
      owasp: A03:2021 - Injection
      category: security
      technology:
        - flask