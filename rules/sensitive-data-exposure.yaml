rules:
  - id: sqlite-trace-callback-data-exposure
    pattern: $CONN.set_trace_callback(print)
    message: >
      Sensitive data exposure: set_trace_callback(print) logs every SQL statement
      including query parameters to standard output. In production this exposes
      usernames, passwords and other sensitive data in application logs.
      Remove the trace callback or redirect it to a secure, access-controlled
      logging system that masks sensitive values.
      CWE-200 / OWASP A01:2021 - Broken Access Control.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: "CWE-200"
      owasp: "A01:2021 - Broken Access Control"
      ground-truth-id: "V07"
      confidence: HIGH
      thesis: "Shift-Left Security in CI/CD Pipelines"