rules:
  - id: flask-jwt-insecure-decode
    pattern: jwt.decode(..., verify=False, ...)
    message: >
      Insecure JWT verification: verify=False disables JWT signature checking.
      An attacker can forge any JWT token and completely bypass authentication.
      Always verify JWT signatures against a strong secret key or public key,
      and explicitly specify allowed algorithms.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-347
      owasp: A02:2021 - Cryptographic Failures
      category: security
      technology:
        - flask